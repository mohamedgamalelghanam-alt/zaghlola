<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بن وعطارة زغلولة | الأصل في البحيرة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --coffee: #3E2723; --orange: #D84315; --bg: #FDFBF7; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: var(--bg); color: #2c2c2c; }
        .container { width: 90%; max-width: 1200px; margin: 0 auto; }
        
        /* Header */
        header { background: var(--white); padding: 15px 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .nav { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: 900; color: var(--coffee); text-decoration: none; }
        .cart-btn { position: relative; cursor: pointer; font-size: 1.5rem; }
        .badge { position: absolute; top: -10px; right: -10px; background: var(--orange); color: white; padding: 2px 6px; border-radius: 50%; font-size: 0.7rem; }

        /* Hero Section */
        .hero { 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('zaghlola.png') center/cover; 
            height: 350px; display: flex; align-items: center; justify-content: center; color: white; text-align: center; border-radius: 0 0 40px 40px; 
        }

        /* Branches */
        .section-title { text-align: center; margin: 40px 0 20px; color: var(--coffee); }
        .branches { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .branch-card { background: white; padding: 20px; border-radius: 15px; border-right: 5px solid var(--orange); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        /* Products */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin: 30px 0; }
        .card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 220px; object-fit: cover; }
        .card-body { padding: 20px; }
        .price { color: var(--orange); font-weight: 700; font-size: 1.2rem; margin: 10px 0; }
        .btn { background: var(--coffee); color: white; width: 100%; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* Checkout Form */
        #checkout { display: none; background: white; padding: 30px; border-radius: 20px; margin-top: 40px; border: 2px solid var(--coffee); }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .btn-wa { background: #25d366; color: white; width: 100%; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }

        footer { text-align: center; padding: 40px; background: var(--coffee); color: white; margin-top: 50px; }
    </style>
</head>
<body>

    <header>
        <div class="container nav">
            <div class="cart-btn" onclick="showCart()">
                <i class="fas fa-shopping-basket"></i>
                <span class="badge" id="count">0</span>
            </div>
            <a href="#" class="logo">بن وعطارة زغلولة</a>
        </div>
    </header>

    <section class="hero">
        <div>
            <h1>أهلاً بك في عالم زغلولة</h1>
            <p>أصل البن والعطارة في البحيرة</p>
        </div>
    </section>

    <main class="container">
        <h2 class="section-title">فروعنا</h2>
        <div class="branches">
            <div class="branch-card"><h4>المحمودية</h4><p>أمام المستشفى العام</p></div>
            <div class="branch-card"><h4>المحمودية</h4><p>برج سما</p></div>
            <div class="branch-card"><h4>إيتاي البارود</h4><p>شارع مجلس المدينة</p></div>
        </div>

        <h2 class="section-title">منتجاتنا</h2>
        <div class="grid">
            <div class="card">
                <img src="zaghlola.png" alt="بن زغلولة">
                <div class="card-body">
                    <h3>توليفة بن زغلولة</h3>
                    <p class="price">150 EGP</p>
                    <button class="btn" onclick="add('بن زغلولة', 150)">إضافة للسلة</button>
                </div>
            </div>
            <div class="card">
                <img src="images.jpg" alt="بهارات">
                <div class="card-body">
                    <h3>خلطة بهارات لحم</h3>
                    <p class="price">40 EGP</p>
                    <button class="btn" onclick="add('بهارات لحم', 40)">إضافة للسلة</button>
                </div>
            </div>
        </div>

        <div id="checkout">
            <h3>مراجعة طلبك</h3>
            <div id="items-list" style="margin: 15px 0;"></div>
            <input type="text" id="cust-name" placeholder="الاسم بالكامل">
            <input type="text" id="cust-phone" placeholder="رقم الهاتف">
            <textarea id="cust-address" placeholder="العنوان بالتفصيل"></textarea>
            <button class="btn-wa" onclick="send()">إرسال الطلب واتساب <i class="fab fa-whatsapp"></i></button>
        </div>
    </main>

    <footer><p>جميع الحقوق محفوظة لـ زغلولة © 2024</p></footer>

    <script>
        let cart = [];
        function add(n, p) {
            cart.push({name: n, price: p});
            document.getElementById('count').innerText = cart.length;
            alert('تمت الإضافة للسلة');
        }
        function showCart() {
            if(cart.length == 0) return alert('السلة فارغة');
            let html = ''; let total = 0;
            cart.forEach(i => { html += `<p>• ${i.name} - ${i.price} EGP</p>`; total += i.price; });
            html += `<strong>الإجمالي: ${total} EGP</strong>`;
            document.getElementById('items-list').innerHTML = html;
            document.getElementById('checkout').style.display = 'block';
            window.location.hash = 'checkout';
        }
        function send() {
            const n = document.getElementById('cust-name').value;
            const a = document.getElementById('cust-address').value;
            if(!n || !a) return alert('كمل البيانات يا غالي');
            let text = `*طلب جديد من زغلولة*%0Aالاسم: ${n}%0Aالعنوان: ${a}%0Aالطلبات:%0A`;
            cart.forEach(i => text += `- ${i.name}%0A`);
            window.open(`https://wa.me/201008836269?text=${text}`, '_blank');
        }
    </script>
</body>
</html>
